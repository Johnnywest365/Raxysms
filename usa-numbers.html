<!DOCTYPE html>
<html lang="en">

<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>USA Numbers | RaxySMS</title>

<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>

<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700&display=swap" rel="stylesheet">

<link rel="stylesheet" href="numbers.css">

</head>

<body>

<div class="container">

    <!-- Header -->

    <header class="header">

        <div>

            <h1>🇺🇸 USA Numbers</h1>

            <p>Buy USA virtual numbers for SMS verification</p>

        </div>

        <div class="wallet">

            Wallet:
            <strong id="walletBalance">₦0</strong>

        </div>

    </header>

    <!-- Search -->

    <div class="search-box">

        <input
            type="text"
            id="searchInput"
            placeholder="🔍 Search services...">

    </div>

    <!-- Table Header -->

    <div class="table-header">

        <span>Service</span>

        <span>Price</span>

        <span>Action</span>

    </div>

  <!-- ==========================================
     SERVICES AREA
========================================== -->

<section class="services-section">

    <!-- Popular Services -->
    <div class="service-block">

        <h2>
            ⭐ Popular Services
        </h2>

        <div id="popularServices" class="service-table">

            <!-- Popular services loaded from Firebase -->

        </div>

    </div>


    <!-- All Other Services -->
    <div class="service-block">

        <h2>
            🌍 All Services
        </h2>

        <div id="otherServices" class="service-table">

            <!-- Other services loaded from Firebase -->

        </div>

    </div>


</section>



<!-- ==========================================
     PURCHASE MODAL
========================================== -->

<div id="purchaseModal" class="modal">

    <div class="modal-box">

        <h3>
            Confirm Purchase
        </h3>


        <div class="purchase-info">

            <p>
                Service:
                <span id="modalService">
                    
                </span>
            </p>


            <p>
                Country:
                <span>
                    🇺🇸 USA
                </span>
            </p>


            <p>
                Price:
                ₦<span id="modalPrice">
                    
                </span>
            </p>

        </div>


        <div class="modal-actions">

            <button 
                id="cancelPurchase"
                class="cancel-btn">
                Cancel
            </button>


            <button 
                id="confirmPurchase"
                class="confirm-btn">
                Confirm Purchase
            </button>

        </div>


    </div>

</div>
