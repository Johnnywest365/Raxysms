<!DOCTYPE html>
<html lang="en">

<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>USA Numbers | RaxySMS</title>

<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>

<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700&display=swap" rel="stylesheet">

<link rel="stylesheet" href="numbers.css">

</head>

<body>

<div class="container">

    <!-- Header -->

    <header class="header">

        <div>

            <h1>🇺🇸 USA Numbers</h1>

            <p>Buy USA virtual numbers for SMS verification</p>

        </div>

        <div class="wallet">

            Wallet:
            <strong id="walletBalance">₦0</strong>

        </div>

    </header>

    <!-- Search -->

    <div class="search-box">

        <input
            type="text"
            id="searchInput"
            placeholder="🔍 Search services...">

    </div>

    <!-- Table Header -->

    <div class="table-header">

        <span>Service</span>

        <span>Price</span>

        <span>Action</span>

    </div>

  <!-- ==========================================
     SERVICES AREA
========================================== -->

<section class="services-section">

    <!-- Popular Services -->
    <div class="service-block">

        <h2>
            ⭐ Popular Services
        </h2>

        <div id="popularServices" class="service-table">

            <!-- Popular services loaded from Firebase -->

        </div>

    </div>


    <!-- All Other Services -->
    <div class="service-block">

        <h2>
            🌍 All Services
        </h2>

        <div id="otherServices" class="service-table">

            <!-- Other services loaded from Firebase -->

        </div>

    </div>


</section>



<!-- ==========================================
     PURCHASE MODAL
========================================== -->

<div id="purchaseModal" class="modal">

    <div class="modal-box">

        <h3>
            Confirm Purchase
        </h3>


        <div class="purchase-info">

            <p>
                Service:
                <span id="modalService">
                    
                </span>
            </p>


            <p>
                Country:
                <span>
                    🇺🇸 USA
                </span>
            </p>


            <p>
                Price:
                ₦<span id="modalPrice">
                    
                </span>
            </p>

        </div>


        <div class="modal-actions">

            <button 
                id="cancelPurchase"
                class="cancel-btn">
                Cancel
            </button>


            <button 
                id="confirmPurchase"
                class="confirm-btn">
                Confirm Purchase
            </button>

        </div>


    </div>

</div>

    <!-- ==========================================
     PAGE STYLE
========================================== -->

<style>

*{
    margin:0;
    padding:0;
    box-sizing:border-box;
}


body{

    font-family:'Poppins',sans-serif;
    background:#050B18;
    color:#fff;
    padding-bottom:90px;

}


/* ===============================
   MAIN CONTAINER
================================ */

.numbers-container{

    width:100%;
    max-width:650px;
    margin:auto;
    padding:20px;

}


/* ===============================
   WALLET CARD
================================ */

.wallet-card{

    background:linear-gradient(
        135deg,
        #2563EB,
        #7C3AED
    );

    padding:20px;
    border-radius:18px;
    margin-bottom:20px;

}


.wallet-card h3{

    font-size:15px;
    opacity:.8;

}


.wallet-card h1{

    margin-top:8px;
    font-size:28px;

}



/* ===============================
   SEARCH
================================ */

.search-box{

    margin:20px 0;

}


.search-box input{

    width:100%;
    padding:14px 18px;

    border:none;
    outline:none;

    border-radius:12px;

    background:#111827;
    color:white;

    font-size:15px;

}



/* ===============================
   SERVICE BLOCK
================================ */


.service-block{

    margin-top:25px;

}


.service-block h2{

    font-size:18px;
    margin-bottom:15px;

}



/* ===============================
   SERVICE ROW
================================ */


.service-row{

    display:flex;
    justify-content:space-between;
    align-items:center;

    background:#111827;

    padding:15px;

    border-radius:14px;

    margin-bottom:12px;

}



.service-name{

    font-size:15px;
    font-weight:500;

}



.service-price{

    color:#FACC15;
    font-weight:600;

}



.buy-btn{

    background:#2563EB;

    border:none;

    color:white;

    padding:8px 15px;

    border-radius:10px;

    cursor:pointer;

}


.buy-btn:hover{

    opacity:.8;

}



/* ===============================
   PURCHASE MODAL
================================ */


.modal{

    display:none;

    position:fixed;

    inset:0;

    background:rgba(0,0,0,.7);

    align-items:center;

    justify-content:center;

    z-index:999;

}



.modal-box{

    width:90%;
    max-width:400px;

    background:#111827;

    padding:25px;

    border-radius:20px;

}



.modal-box h3{

    text-align:center;
    margin-bottom:20px;

}



.purchase-info p{

    margin:12px 0;

}



.modal-actions{

    display:flex;

    gap:10px;

    margin-top:25px;

}



.modal-actions button{

    flex:1;

    padding:12px;

    border:none;

    border-radius:12px;

    cursor:pointer;

}



.cancel-btn{

    background:#374151;

    color:white;

}



.confirm-btn{

    background:#22C55E;

    color:white;

}



</style>

    <!-- ==========================================
     BOTTOM NAVIGATION
========================================== -->

<nav class="bottom-nav">


    <a href="dashboard.html">

        🏠
        <span>
            Dashboard
        </span>

    </a>



    <a href="usa-numbers.html" class="active">

        📱
        <span>
            Numbers
        </span>

    </a>



    <a href="fund-wallet.html">

        💰
        <span>
            Wallet
        </span>

    </a>



    <button id="logoutBtn">

        🚪
        <span>
            Logout
        </span>

    </button>


</nav>




<!-- ==========================================
     BOTTOM NAV STYLE
========================================== -->

<style>

.bottom-nav{

    position:fixed;

    bottom:0;

    left:0;

    width:100%;

    background:#0B1220;

    display:flex;

    justify-content:space-around;

    align-items:center;

    padding:12px 5px;

    border-top:1px solid #1F2937;

    z-index:500;


}



.bottom-nav a,
.bottom-nav button{


    text-decoration:none;

    color:#9CA3AF;

    background:none;

    border:none;

    font-size:13px;

    display:flex;

    flex-direction:column;

    align-items:center;

    gap:4px;

    cursor:pointer;


}



.bottom-nav a.active{

    color:#2563EB;

}



.bottom-nav span{

    font-size:12px;

}



</style>

    <!-- ==========================================
     FIREBASE + PAGE SCRIPT
========================================== -->


<script type="module" src="./usa-numbers.js"></script>



</body>

</html>
