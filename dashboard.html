<!DOCTYPE html>
<html lang="en">

<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>RaxySMS Dashboard</title>

<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>

<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">

<link rel="stylesheet" href="dashboard.css">

</head>

<body>

<div class="dashboard">

<!-- ================= HEADER ================= -->

<header class="top-header">

<div class="logo">
RaxySMS
</div>

<p class="tagline">
Buy your verification Easy way
</p>

</header>



<!-- ================= WELCOME ================= -->

<section class="welcome">

<h2>
Welcome, <span id="userName">User</span>
</h2>

</section>



<!-- ================= WALLET ================= -->

<section class="wallet-card">

<h4>
AVAILABLE BALANCE
</h4>

<div class="balance-row">

<h1>
₦<span id="walletBalance">0.00</span>
</h1>

<button id="fundWalletBtn">
+ Add Funds
</button>

</div>

<p>
Thanks for partnering with us
</p>

</section>



<!-- ================= QUICK ACTIONS ================= -->

<section class="quick-actions">

<button id="profileBtn">
Profile
</button>

<button id="historyBtn">
History
</button>

<button id="accountsBtn">
Buy Accounts
</button>

<button id="supportBtn">
Support
</button>

</section>



<!-- ================= NUMBER OPTIONS ================= -->

<section class="number-options">

<a href="usa-numbers.html" class="number-btn">
🇺🇸 USA Numbers
</a>

<a href="all-countries.html" class="number-btn">
🌍 All Countries Numbers
</a>

</section>



<!-- ================= RECENT ACTIVATIONS ================= -->

<section class="activations">

<div class="section-title">

<h3>
⭐ Recent Activations
</h3>

<button id="refreshBtn">
Refresh
</button>

</div>

<div class="table-container">

<table>

<thead>

<tr>

<th>Service</th>
<th>Number</th>
<th>SMS Code</th>
<th>Price</th>
<th>Status</th>
<th>Date</th>

</tr>

</thead>

<tbody id="activationList">

<tr>

<td colspan="6">
No activations yet
</td>

</tr>

</tbody>

</table>

</div>

</section>



<!-- ================= BOTTOM NAV ================= -->

<nav class="bottom-nav">

<button id="ordersBtn">
My Orders
</button>

<button id="walletBtn">
+ Add Funds
</button>

<button class="active">
Home
</button>

<button id="apiBtn">
API
</button>

<button id="logoutBtn">
Logout
</button>

</nav>

</div>

<script type="module" src="dashboard.js"></script>

</body>

</html>
